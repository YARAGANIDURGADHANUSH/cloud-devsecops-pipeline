name: Zero Trust Sandbox Pipeline

on:
  # Trigger on push or PR to main, just like your other pipeline
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to manually trigger this specific workflow from the GitHub "Actions" tab
  workflow_dispatch:

# STEP 1: ENFORCE LEAST PRIVILEGE ACCORDING TO ZERO TRUST PRINCIPLES
permissions:
  contents: read          # The runner can only read your code; it cannot write or alter Git history
  security-events: write  # The runner is explicitly allowed to publish Trivy vulnerability reports

jobs:
  secure-build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # STEP 2: ENFORCE ZERO TRUST COMPLIANCE VIA GATEKEEPER SCANNING
    - name: Run Trivy Vulnerability Scan (Strict Mode)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'          # Scans the project's filesystem structure
        format: 'table'
        exit-code: '1'           # CRITICAL: This explicitly forces the pipeline to FAIL and cut off if issues exist
        ignore-unfixed: true     # Skips vulnerabilities that don't have an official patch yet
        severity: 'CRITICAL,HIGH' # Targets only dangerous security flaws