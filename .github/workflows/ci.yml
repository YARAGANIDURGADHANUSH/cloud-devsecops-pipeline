name: CI - Build, Test, Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Basic Flask test
        run: |
          python -c "import flask; print('Flask import OK')"

      - name: Build Docker image
        run: |
          docker build -t devsecops-pipeline:latest .

      - name: Run container for health check
        run: |
          docker run -d -p 5000:5000 --name devsecops-ci devsecops-pipeline
          
          echo "Waiting for application to start..."
          for i in {1..10}; do
            if curl -f http://localhost:5000/health; then
              echo "Health check passed"
              break
            fi
            echo "Retrying... ($i)"
            sleep 3
          done

      - name: Stop test container
        run: |
          docker stop devsecops-ci
          docker rm devsecops-ci

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg lsb-release wget apt-transport-https
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: |
          mkdir -p reports
          trivy image --severity HIGH,CRITICAL --no-progress devsecops-pipeline:latest > reports/trivy-report.txt || true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: reports/trivy-report.txt

      - name: Trivy Summary
        run: |
          echo "## 🔐 Trivy Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "HIGH vulnerabilities:" $(grep -c "HIGH" reports/trivy-report.txt || true) >> $GITHUB_STEP_SUMMARY
          echo "CRITICAL vulnerabilities:" $(grep -c "CRITICAL" reports/trivy-report.txt || true) >> $GITHUB_STEP_SUMMARY
