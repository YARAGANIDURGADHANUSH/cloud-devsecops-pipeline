name: CI - Build, Test, Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Build Docker image
        run: |
          docker build -t devsecops-pipeline:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name devsecops-ci devsecops-pipeline
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:5000/health

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg lsb-release wget apt-transport-https
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy Scan (HIGH / CRITICAL)
        run: |
          mkdir -p reports
          trivy image --severity HIGH,CRITICAL --no-progress \
          --format table devsecops-pipeline:latest > reports/trivy-report.txt || true

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: reports/trivy-report.txt
